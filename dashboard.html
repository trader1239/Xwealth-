<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WealthX - Dashboard</title>
  <style>
    body { font-family: Arial; padding: 30px; background: #0f172a; color: white; }
    button { padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>
  <p id="userEmail">Loading...</p>
  <button id="logoutBtn">Logout</button>

  <script type="module">
    import { auth } from './src/firebase.js'
    import { onAuthStateChanged, signOut } from "firebase/auth";
    
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('userEmail').textContent = "Logged in: " + user.email
      } else {
        window.location.href = "/login.html"
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "/login.html"
      })
    })
  </script>
</body>
</html>
