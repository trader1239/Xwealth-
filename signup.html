<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WealthX - Sign Up</title>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white; }
    .box { background: #1e293b; padding: 30px; border-radius: 12px; width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; }
    button { width: 100%; padding: 12px; background: #22c55e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #16a34a; }
    #error { color: #ef4444; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Account</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signupBtn">Create Account</button>
    <p id="error"></p>
    <p>Already have account? <a href="/login.html" style="color:#22c55e">Login</a></p>
  </div>

  <script type="module">
    import { auth } from './src/firebase.js'
    import { createUserWithEmailAndPassword } from "firebase/auth";
    
    const signupBtn = document.getElementById('signupBtn')
    const errorEl = document.getElementById('error')

    signupBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "/dashboard.html"
        })
        .catch((error) => {
          errorEl.textContent = error.message
        });
    })
  </script>
</body>
</html>
