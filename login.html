<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Xwealth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#0a0f1e] text-white flex items-center justify-center min-h-screen px-4">

  <div class="bg-[#111827] p-10 rounded-2xl w-full max-w-md border-gray-800">
    <h1 class="text-3xl font-extrabold text-center mb-2 text-green-400">Welcome Back</h1>
    <p class="text-gray-400 text-center mb-8">Login to your Xwealth account</p>

    <form class="space-y-4">
      <input type="email" placeholder="Email" required class="w-full p-3 rounded-lg bg-[#1f2937] border-gray-700 focus:border-green-500 outline-none">
      <input type="password" placeholder="Password" required class="w-full p-3 rounded-lg bg-[#1f2937] border-gray-700 focus:border-green-500 outline-none">
      <button type="submit" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-lg font-bold text-lg">Login</button>
    </form>

    <p class="text-gray-400 text-center mt-6">Don't have an account? 
      <a href="signup.html" class="text-green-400 font-semibold hover:underline">Sign Up</a>
    </p>
    <p class="text-center mt-4">
      <a href="index.html" class="text-gray-500 hover:text-white text-sm">← Back to Home</a>
    </p>
  </div>

</body>
        </html>
