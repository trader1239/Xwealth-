<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WealthX - Login</title>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white; }
    .box { background: #1e293b; padding: 30px; border-radius: 12px; width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2563eb; }
    #error { color: #ef4444; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="error"></p>
    <p>No account? <a href="/signup.html" style="color:#3b82f6">Sign Up</a></p>
  </div>

  <script type="module">
    import { auth } from './src/firebase.js'
    import { signInWithEmailAndPassword } from "firebase/auth";
    
    const loginBtn = document.getElementById('loginBtn')
    const errorEl = document.getElementById('error')

    loginBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "/dashboard.html"
        })
        .catch((error) => {
          errorEl.textContent = error.message
        });
    })
  </script>
</body>
</html>
