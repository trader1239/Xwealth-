<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WealthX - Home</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #0f172a; color: white; }
    a, button { padding: 12px 24px; background: #22c55e; color: white; border: none; border-radius: 8px; text-decoration: none; cursor: pointer; margin: 10px; }
  </style>
</head>
<body>
  <h1>Welcome to WealthX 💰</h1>
  <p>Grow your wealth with us</p>
  <a href="/signup.html">Sign Up</a>
  <a href="/login.html">Login</a>

  <script type="module">
    import { auth } from './src/firebase.js'
    import { onAuthStateChanged } from "firebase/auth";
    
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "/dashboard.html"
      }
    });
  </script>
</body>
</html>
